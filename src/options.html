<!DOCTYPE html>
<html>
<head>
    <title>OSM Settings</title>
    <script defer src="options.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        button {
            padding: 8px 16px;
            margin-top: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button.logout {
            background-color: #f44336;
        }
        .status {
            margin-top: 10px;
            padding: 10px;
            border-radius: 4px;
            background-color: #f1f1f1;
        }
    </style>
</head>
<body>
    <h1>OpenStreetMap Settings</h1>
    <div id="login-section">
        <p id="status-text">Checking login status...</p>
        <button id="login-button">Log in with OpenStreetMap</button>
        <button id="logout-button" class="logout" style="display: none;">Log out</button>
    </div>
    <div class="status" id="user-info" style="display:none;">
        <strong>Logged in as</strong>: <span id="user-name"></span>
    </div>
</body>
</html>
